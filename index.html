<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중장년 취업준비 상태 진단</title>
<style>
  :root {
    --navy:       #1A2E4A;
    --navy-mid:   #2C4A6E;
    --navy-light: #E8EEF5;
    --orange:     #D4621A;
    --orange-l:   #FAF0E8;
    --green:      #2D6A4F;
    --green-l:    #E4F2EB;
    --red:        #C0392B;
    --red-l:      #FDECEA;
    --gold:       #E8A020;
    --bg:         #FAF7F2;
    --card:       #FFFFFF;
    --border:     #E0D8CF;
    --text:       #1A1A1A;
    --muted:      #777777;
    --gray-l:     #F4F2EE;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; padding-bottom:60px;
  }

  /* ── 헤더 ─────────────────────────────────────── */
  .hero {
    background:var(--navy);
    padding:36px 32px 28px;
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute;
    right:-60px; top:-60px;
    width:260px; height:260px;
    border-radius:50%;
    background:rgba(255,255,255,0.03);
  }
  .hero::after {
    content:''; position:absolute;
    right:80px; bottom:-80px;
    width:180px; height:180px;
    border-radius:50%;
    background:rgba(212,98,26,0.12);
  }
  .hero-tag  { font-size:13px; letter-spacing:4px; color:#8AAAC8; margin-bottom:8px; }
  .hero-title{ font-size:28px; font-weight:700; color:#fff; line-height:1.35; margin-bottom:4px; }
  .hero-sub  { font-size:15px; color:#8AAAC8; margin-bottom:24px; }

  /* ── 전체 진행률 ──────────────────────────────── */
  .progress-wrap {
    background:rgba(255,255,255,0.07);
    border-radius:10px; padding:16px 20px;
    position:relative; z-index:1;
  }
  .progress-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .progress-label{ font-size:14px; color:#AABBCC; }
  .progress-pct  { font-size:30px; font-weight:700; color:var(--gold); transition:all .3s; }
  .progress-bar-bg{ height:8px; background:rgba(255,255,255,0.1); border-radius:99px; overflow:hidden; }
  .progress-bar-fill{ height:100%; background:var(--gold); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1); width:0%; }
  .progress-sub  { display:flex; gap:16px; margin-top:8px; }
  .progress-sub span{ font-size:14px; color:#8AAAC8; }
  .progress-sub strong{ color:#fff; }

  /* ── 진단 단계 배너 ───────────────────────────── */
  .stage-banner {
    display:none;
    margin:0 20px;
    border-radius:0 0 10px 10px;
    padding:10px 20px;
    font-size:15px; font-weight:700;
    text-align:center;
    transition:all .3s;
  }
  .stage-banner.show { display:block; }
  .stage-0 { background:#EEF2F8; color:var(--navy-mid); }
  .stage-1 { background:#FFF5EA; color:#B04010; }
  .stage-2 { background:#FFF9E0; color:#8B6000; }
  .stage-3 { background:#E8F5EE; color:var(--green); }
  .stage-4 { background:var(--green); color:#fff; }

  /* ── 컨텐츠 ───────────────────────────────────── */
  .content { padding:24px 20px 0; max-width:740px; margin:0 auto; }

  /* ── 섹션 카드 ────────────────────────────────── */
  .section-card {
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--border);
    margin-bottom:14px;
    overflow:hidden;
  }

  /* 섹션 헤더 */
  .section-hdr {
    display:flex; align-items:center; gap:12px;
    padding:14px 18px;
    cursor:pointer; user-select:none;
    border-bottom:1px solid transparent;
    transition:background .15s;
  }
  .section-hdr:hover { background:var(--gray-l); }
  .section-hdr.open  { border-bottom-color:var(--border); }

  .sec-icon {
    width:38px; height:38px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .ic-navy   { background:var(--navy-light); }
  .ic-orange { background:var(--orange-l); }
  .ic-green  { background:var(--green-l); }
  .ic-red    { background:var(--red-l); }
  .ic-gold   { background:#FEF3D8; }

  .sec-info { flex:1; }
  .sec-name { font-size:17px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .sec-desc { font-size:14px; color:var(--muted); }

  .sec-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .sec-pill  {
    font-size:14px; font-weight:700;
    padding:3px 10px; border-radius:99px;
    background:var(--gray-l); color:var(--muted);
    transition:all .3s;
  }
  .sec-pill.done { background:var(--green-l); color:var(--green); }
  .sec-chevron { font-size:13px; color:var(--muted); transition:transform .25s; }
  .section-hdr.open .sec-chevron { transform:rotate(180deg); }

  /* 미니 진행 바 */
  .mini-bar { height:3px; background:var(--gray-l); overflow:hidden; }
  .mini-fill { height:100%; transition:width .4s; width:0%; }
  .mf-navy   { background:var(--navy); }
  .mf-orange { background:var(--orange); }
  .mf-green  { background:var(--green); }
  .mf-red    { background:var(--red); }
  .mf-gold   { background:var(--gold); }

  /* 섹션 본문 */
  .section-body { display:none; padding:4px 0; }
  .section-body.open { display:block; }

  /* ── 체크 항목 ────────────────────────────────── */
  .check-item {
    display:flex; flex-direction:column; gap:8px;
    padding:12px 18px;
    border-bottom:1px solid var(--border);
    transition:background .12s;
  }
  .check-item:last-child { border-bottom:none; }
  .check-item.ans-yes { background:#F0FBF4; }
  .check-item.ans-no  { background:#FDF3F2; }

  .check-text { flex:1; }
  .check-main {
    font-size:15px; color:var(--text); line-height:1.65;
    transition:color .2s;
  }
  .check-item.ans-yes .check-main { color:var(--green); }
  .check-item.ans-no  .check-main { color:#999; text-decoration:line-through; text-decoration-color:#CCC; }
  .check-sub {
    font-size:13px; color:var(--muted);
    margin-top:2px; line-height:1.4;
  }
  .check-item.ans-yes .check-sub { color:#7BBFA0; }
  .check-item.ans-no  .check-sub { color:#CCC; }

  /* 예/아니오 버튼 그룹 */
  .yn-wrap {
    display:flex; gap:8px;
  }
  .yn-btn {
    font-family:inherit; font-size:14px; font-weight:700;
    padding:6px 0; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--border); background:#fff;
    transition:all .15s; line-height:1.4;
    flex:1; text-align:center;
  }
  .yn-btn.yes { color:var(--green); }
  .yn-btn.no  { color:var(--red); }
  .yn-btn.yes.active {
    background:var(--green); border-color:var(--green); color:#fff;
  }
  .yn-btn.no.active {
    background:var(--red); border-color:var(--red); color:#fff;
  }
  .yn-btn:not(.active):hover { background:var(--gray-l); }

  /* 구분선 */
  .grp-label {
    font-size:12px; font-weight:700;
    color:var(--muted); letter-spacing:1px;
    padding:10px 18px 4px;
    background:var(--gray-l);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
  }

  /* ── 결과 진단 카드 ───────────────────────────── */
  .result-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 20px;
    margin-bottom:14px;
  }
  .result-title {
    font-size:14px; font-weight:700;
    color:var(--muted); letter-spacing:1px;
    margin-bottom:14px;
  }
  .stages { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .stage-item {
    border-radius:8px; padding:10px 6px;
    text-align:center; border:1.5px solid var(--border);
    background:var(--gray-l); transition:all .3s;
  }
  .stage-item.active { border-color:var(--green); background:var(--green-l); }
  .stage-icon  { font-size:22px; margin-bottom:5px; }
  .stage-name  { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:2px; }
  .stage-item.active .stage-name { color:var(--green); }
  .stage-range { font-size:12px; color:#BBBBBB; }
  .stage-item.active .stage-range { color:var(--green); }

  /* ── 리셋 & 인쇄 ──────────────────────────────── */
  .btn-wrap { text-align:center; margin-top:16px; }
  .btn-reset {
    font-family:inherit; font-size:15px;
    color:var(--muted); background:none;
    border:1px solid var(--border); border-radius:8px;
    padding:8px 20px; cursor:pointer; transition:all .15s;
  }
  .btn-reset:hover { background:var(--gray-l); color:var(--text); }

  .print-btn {
    position:fixed; bottom:24px; right:24px;
    background:var(--navy); color:#fff;
    border:none; border-radius:50px;
    padding:12px 22px;
    font-family:inherit; font-size:15px; font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(26,46,74,0.25);
    transition:all .2s; z-index:100;
  }
  .print-btn:hover { background:var(--navy-mid); transform:translateY(-2px); }

  /* ── 강의 메모 박스 ───────────────────────────── */
  .memo-card {
    background:var(--orange-l);
    border:1px solid var(--orange);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:14px;
  }
  .memo-title { font-size:15px; font-weight:700; color:var(--orange); margin-bottom:8px; }
  .memo-box {
    width:100%; border:1px solid var(--border);
    border-radius:6px; background:#fff;
    font-family:inherit; font-size:15px;
    padding:10px; resize:none; line-height:1.6;
    color:var(--text);
  }

  /* ── 결과 모달 ───────────────────────────────── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); z-index:200;
    align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-overlay.show { display:flex; }
  .modal-box {
    background:#fff; border-radius:16px;
    width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .modal-head {
    background:var(--navy); border-radius:16px 16px 0 0;
    padding:24px 24px 20px; position:sticky; top:0; z-index:1;
  }
  .modal-head-tag { font-size:12px; letter-spacing:3px; color:#8AAAC8; margin-bottom:6px; }
  .modal-head-title { font-size:22px; font-weight:700; color:#fff; margin-bottom:4px; }
  .modal-head-sub { font-size:14px; color:#8AAAC8; }
  .modal-score-wrap {
    display:flex; align-items:center; gap:20px;
    margin-top:16px; background:rgba(255,255,255,0.07);
    border-radius:10px; padding:14px 18px;
  }
  .modal-score-big { font-size:48px; font-weight:700; color:var(--gold); line-height:1; }
  .modal-score-info { flex:1; }
  .modal-stage-badge {
    display:inline-block; font-size:14px; font-weight:700;
    padding:4px 12px; border-radius:99px; margin-bottom:6px;
  }
  .modal-score-desc { font-size:14px; color:#8AAAC8; line-height:1.5; }

  .modal-body { padding:20px 24px 24px; }
  .modal-section-title {
    font-size:13px; font-weight:700; color:var(--muted);
    letter-spacing:1px; margin-bottom:12px; margin-top:20px;
  }
  .modal-section-title:first-child { margin-top:0; }

  .result-row {
    display:flex; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .result-row:last-child { border-bottom:none; }
  .result-row-icon { font-size:18px; width:26px; text-align:center; flex-shrink:0; }
  .result-row-name { flex:1; font-size:15px; font-weight:600; }
  .result-row-bar-wrap { width:90px; }
  .result-row-bar-bg {
    height:6px; background:var(--gray-l); border-radius:99px; overflow:hidden;
    margin-bottom:3px;
  }
  .result-row-bar-fill { height:100%; border-radius:99px; transition:width .6s; }
  .result-row-pct { font-size:13px; font-weight:700; text-align:right; }

  .advice-box {
    background:var(--navy-light); border-radius:10px;
    padding:14px 16px; margin-top:6px;
  }
  .advice-line {
    font-size:14px; color:var(--navy-mid); line-height:1.7;
    padding-left:14px; position:relative;
  }
  .advice-line::before {
    content:'•'; position:absolute; left:0; color:var(--orange);
  }

  .modal-close-btn {
    width:100%; font-family:inherit; font-size:16px; font-weight:700;
    background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:14px; cursor:pointer; margin-top:20px;
    transition:background .15s;
  }
  .modal-close-btn:hover { background:var(--navy-mid); }

  /* 결과 보기 버튼 */
  .btn-result {
    font-family:inherit; font-size:15px; font-weight:700;
    color:#fff; background:var(--orange);
    border:none; border-radius:8px;
    padding:9px 22px; cursor:pointer; transition:all .15s;
    margin-left:10px;
  }
  .btn-result:hover { background:#C05010; }

  @media print {
    body { background:#fff; padding:0; }
    .hero { padding:16px 24px; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .section-body { display:block !important; }
    .section-hdr.open { background:none !important; }
    .sec-chevron { display:none; }
    .print-btn { display:none; }
    .btn-wrap { display:none; }
    .memo-box { min-height:60px; }
  }

  @media (max-width:480px) {
    .hero { padding:26px 16px 22px; }
    .hero-title { font-size:24px; }
    .content { padding:18px 12px 0; }
    .stages { grid-template-columns:repeat(3,1fr); }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">SELF DIAGNOSIS</div>
  <div class="hero-title">중장년 취업준비 상태 진단</div>
  <div class="hero-sub">강의 시작 전 — 나의 현재 준비 상태를 솔직하게 체크하세요</div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">전체 완료율</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="main-bar"></div>
    </div>
    <div class="progress-sub">
      <span><strong id="done-n">0</strong> / <span id="total-n">0</span> 완료</span>
      <span>· 미완료 <strong id="left-n">0</strong>개</span>
    </div>
  </div>
</div>

<div class="stage-banner" id="stage-banner"></div>

<div class="content" id="content"></div>

<!-- 강의 메모 -->
<div class="content">
  <div class="memo-card">
    <div class="memo-title">📝  강의 후 달라질 것 — 오늘 반드시 해결하고 싶은 것을 적어보세요</div>
    <textarea class="memo-box" rows="3" placeholder="예) 이력서 경력 기술을 성과 중심으로 바꾸는 법을 배우고 싶다..."></textarea>
  </div>

  <!-- 결과 진단 단계 -->
  <div class="result-card">
    <div class="result-title">현재 취업준비 단계</div>
    <div class="stages">
      <div class="stage-item" id="st0">
        <div class="stage-icon">🌱</div>
        <div class="stage-name">시작 전</div>
        <div class="stage-range">0~19%</div>
      </div>
      <div class="stage-item" id="st1">
        <div class="stage-icon">🔍</div>
        <div class="stage-name">탐색 중</div>
        <div class="stage-range">20~39%</div>
      </div>
      <div class="stage-item" id="st2">
        <div class="stage-icon">✏️</div>
        <div class="stage-name">준비 중</div>
        <div class="stage-range">40~59%</div>
      </div>
      <div class="stage-item" id="st3">
        <div class="stage-icon">🚀</div>
        <div class="stage-name">실전 진입</div>
        <div class="stage-range">60~79%</div>
      </div>
      <div class="stage-item" id="st4">
        <div class="stage-icon">🏆</div>
        <div class="stage-name">완전 준비</div>
        <div class="stage-range">80~100%</div>
      </div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn-reset" onclick="resetAll()">↺  처음부터 다시 시작</button>
    <button class="btn-result" onclick="showResult()">📊  결과 확인하기</button>
  </div>
</div>

<!-- 결과 모달 -->
<div class="modal-overlay" id="result-modal" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-tag">DIAGNOSIS RESULT</div>
      <div class="modal-head-title">취업준비 진단 결과</div>
      <div class="modal-head-sub" id="modal-answered-info"></div>
      <div class="modal-score-wrap">
        <div class="modal-score-big" id="modal-score">0%</div>
        <div class="modal-score-info">
          <div class="modal-stage-badge" id="modal-badge"></div>
          <div class="modal-score-desc" id="modal-stage-desc"></div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">영역별 준비 현황</div>
      <div id="modal-rows"></div>
      <div class="modal-section-title">지금 가장 필요한 것</div>
      <div class="advice-box" id="modal-advice"></div>
      <button class="modal-close-btn" onclick="closeResult()">닫기</button>
    </div>
  </div>
</div>

<button class="print-btn" onclick="window.print()">🖨️  인쇄하기</button>

<script>
const SECTIONS = [
  {
    id:'mindset', name:'마음가짐과 방향 설정', icon:'🧭', ic:'ic-navy', mf:'mf-navy',
    desc:'구직 활동의 출발점 — 목표와 태도',
    groups:[
      { label:'목표 설정', items:[
        { t:'재취업의 목적이 명확하다 (생계, 커리어 전환, 보람 등)', h:'막연히 "취업해야지"가 아닌 이유를 알고 있다' },
        { t:'희망 직종·업종을 1~3가지로 좁혀두었다',                h:'모든 곳에 지원하는 것보다 선택과 집중이 효과적' },
        { t:'희망 근무 형태를 정했다 (정규직·계약직·파트타임 등)', h:'' },
        { t:'희망 연봉 범위를 현실적으로 설정했다',                 h:'이전 연봉에 집착하면 기회가 줄어든다' },
      ]},
      { label:'마음가짐', items:[
        { t:'나이는 단점이 아닌 강점임을 받아들이고 있다',          h:'경험·신뢰·안정성 = 중장년의 무기' },
        { t:'거절이나 탈락을 성장의 과정으로 받아들일 준비가 되어 있다', h:'' },
        { t:'재취업에 걸리는 시간이 예상보다 길 수 있음을 인지하고 있다', h:'평균 구직기간 6~12개월' },
      ]},
    ]
  },
  {
    id:'selfknow', name:'나 자신 파악', icon:'🔍', ic:'ic-orange', mf:'mf-orange',
    desc:'강점·경력·가치관 분석 완료 여부',
    groups:[
      { label:'강점 파악', items:[
        { t:'내가 가진 핵심 역량을 3가지 이상 말할 수 있다',        h:'즉시 대답 가능한 수준이어야 한다' },
        { t:'내 강점을 뒷받침하는 구체적 사례(에피소드)가 있다',    h:'숫자·성과 포함' },

  },

    groups:[
      { label:'이력서', items:[
        { t:'이력서를 최근 6개월 이내에 업데이트했다',             h:'오래된 이력서로 지원하면 감점' },
        { t:'경력이 최신 순(역순)으로 배열되어 있다',             h:'채용 담당자는 최근 경력을 가장 먼저 본다' },
        { t:'전문적인 이메일 주소를 사용하고 있다',               h:'baby1973@naver.com → 이름+직군 형태로' },
        { t:'이력서가 A4 2페이지 이내로 정리되어 있다',           h:'' },
        { t:'PDF 형식으로 저장해 두었다',                        h:'HWP는 열리지 않는 경우 있음' },
      ]},
      { label:'자기소개서', items:[
        { t:'자기소개서 초안을 1개 이상 작성해 두었다',           h:'없으면 0점, 있으면 다듬으면 된다' },
        { t:'자기소개서에 STAR 공식이 적용되어 있다',             h:'상황→과제→행동→결과 구조' },
        { t:'"열심히 하겠습니다" 같은 추상적 표현이 없다',        h:'채용담당자가 가장 싫어하는 표현 1위' },
        { t:'지원 직무와 나의 강점이 연결되어 있다',              h:'"귀사에 기여하겠습니다"가 아니라 "OO역량으로 OO에 기여"' },
      ]},
    ]
  },
  {
    id:'info', name:'정보 수집과 채널 활용', icon:'🌐', ic:'ic-red', mf:'mf-red',
    desc:'구직 채널·기업 정보·시장 파악',
    groups:[
      { label:'구직 채널', items:[
        { t:'사람인·잡코리아·워크넷 등 주요 취업 플랫폼에 가입했다', h:'' },
        { t:'중장년 전용 구직 채널(장년인턴, 중장년내일센터 등)을 알고 있다', h:'정부 지원 프로그램 활용 가능' },
        { t:'주 2회 이상 정기적으로 채용 공고를 확인하고 있다',    h:'꾸준함이 핵심' },
        { t:'지원 전 해당 기업 홈페이지·뉴스를 리서치하는 습관이 있다', h:'맞춤 지원이 합격률을 높인다' },
      ]},
      { label:'네트워크', items:[
        { t:'업계 지인(전 동료, 상사, 거래처)에게 구직 중임을 알렸다', h:'숨기지 말 것 — 소개 채용이 가장 확률 높다' },
        { t:'SNS(링크드인, 블라인드 등)를 구직에 활용하고 있다',  h:'' },
        { t:'관심 기업의 채용 정보를 정기적으로 팔로우하고 있다', h:'' },
      ]},
    ]
  },
  {
    id:'interview', name:'면접 준비', icon:'🎤', ic:'ic-gold', mf:'mf-gold',
    desc:'말하기·실전 대응·복장 준비',
    groups:[
      { label:'말하기 준비', items:[
        { t:'1분 자기소개 스피치를 준비해 두었다',                h:'이름·경력·강점·지원 이유 4요소' },
        { t:'"경력 공백을 어떻게 보냈나요?" 답변을 준비했다',     h:'중장년 단골 질문 1위' },
        { t:'"연봉은 어느 정도 기대하세요?" 답변을 준비했다',     h:'감정적 대응 금지 — 유연하게 대답' },
        { t:'"젊은 팀원들과 잘 어울릴 수 있나요?" 답변을 준비했다', h:'나이 관련 질문 대비 필수' },
      ]},
      { label:'실전 대비', items:[
        { t:'모의 면접을 1회 이상 연습해 보았다 (혼자라도)',       h:'거울 앞 or 스마트폰 녹화 활용' },
        { t:'면접 복장을 점검해 두었다',                          h:'단정함이 기본 — 업종에 맞는 수준' },
        { t:'면접 당일 회사까지 가는 교통편을 미리 확인했다',     h:'지각은 절대 금물' },
      ]},
    ]
  },
];

// ── 상태 (null=미답변, true=예, false=아니오) ───────────────────
const state = {};
let totalItems = 0;

const STAGES = [
  { range:[0,19],  cls:'stage-0', text:'🌱  아직 시작 전이에요 — 오늘 강의가 첫걸음입니다!',
    badge:'시작 전', badgeBg:'#EEF2F8', badgeColor:'#2C4A6E' },
  { range:[20,39], cls:'stage-1', text:'🔍  탐색 중이에요 — 방향은 잡혔으니 서류부터 손봐요',
    badge:'탐색 중', badgeBg:'#FFF5EA', badgeColor:'#B04010' },
  { range:[40,59], cls:'stage-2', text:'✏️  준비 중이에요 — 조금만 더 다듬으면 충분합니다',
    badge:'준비 중', badgeBg:'#FFF9E0', badgeColor:'#8B6000' },
  { range:[60,79], cls:'stage-3', text:'🚀  실전 진입 단계예요 — 면접 준비에 집중하세요',
    badge:'실전 진입', badgeBg:'#E8F5EE', badgeColor:'#2D6A4F' },
  { range:[80,100],cls:'stage-4', text:'🏆  완전 준비 완료! — 이 강의로 마지막을 다듬어요',
    badge:'완전 준비', badgeBg:'#2D6A4F', badgeColor:'#fff' },
];

const SECTION_COLORS = ['#1A2E4A','#D4621A','#2D6A4F','#C0392B','#E8A020'];

const ADVICES = {
  mindset:   '목표와 마음가짐이 흔들리면 모든 준비가 무너져요. 재취업 이유를 다시 적어보세요.',
  selfknow:  '나를 모르면 이력서도 면접도 공허해요. 핵심 역량 3가지를 지금 당장 종이에 써보세요.',
  docs:      '서류가 없으면 면접 기회 자체가 없어요. 이력서 초안부터 시작하세요.',
  info:      '정보가 없으면 방향을 잃어요. 오늘 워크넷·사람인에 접속해 공고 3개를 찜해보세요.',
  interview: '준비 없는 면접은 기회 낭비예요. 1분 자기소개 스피치를 오늘 3번 연습하세요.',
};

// ── 렌더링 ──────────────────────────────────────────────────────
function buildUI() {
  const container = document.getElementById('content');
  container.innerHTML = '';
  totalItems = 0;

  SECTIONS.forEach(sec => {
    state[sec.id] = state[sec.id] || {};
    let itemIdx = 0;

    const card = document.createElement('div');
    card.className = 'section-card';

    // 헤더
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr open';
    hdr.id = 'hdr-' + sec.id;
    hdr.innerHTML = `
      <div class="sec-icon ${sec.ic}">${sec.icon}</div>
      <div class="sec-info">
        <div class="sec-name">${sec.name}</div>
        <div class="sec-desc">${sec.desc}</div>
      </div>
      <div class="sec-right">
        <div class="sec-pill" id="pill-${sec.id}">0 / 0</div>
        <div class="sec-chevron">▼</div>
      </div>`;
    hdr.addEventListener('click', () => {
      hdr.classList.toggle('open');
      body.classList.toggle('open');
    });

    // 미니 바
    const mini = document.createElement('div');
    mini.className = 'mini-bar';
    mini.innerHTML = `<div class="mini-fill ${sec.mf}" id="mini-${sec.id}"></div>`;

    // 본문
    const body = document.createElement('div');
    body.className = 'section-body open';

    sec.groups.forEach(grp => {
      const lbl = document.createElement('div');
      lbl.className = 'grp-label';
      lbl.textContent = grp.label;
      body.appendChild(lbl);

      grp.items.forEach(item => {
        if (!(itemIdx in state[sec.id])) state[sec.id][itemIdx] = null;
        totalItems++;
        const val = state[sec.id][itemIdx];

        const row = document.createElement('div');
        row.className = 'check-item' + (val === true ? ' ans-yes' : val === false ? ' ans-no' : '');
        row.innerHTML = `
          <div class="check-text">
            <div class="check-main">${item.t}</div>
            ${item.h ? `<div class="check-sub">${item.h}</div>` : ''}
          </div>
          <div class="yn-wrap">
            <button class="yn-btn yes${val === true  ? ' active' : ''}" data-v="yes">예</button>
            <button class="yn-btn no ${val === false ? ' active' : ''}" data-v="no">아니오</button>
          </div>`;

        const idx = itemIdx;
        row.querySelectorAll('.yn-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const isYes = btn.dataset.v === 'yes';
            const prev  = state[sec.id][idx];
            // 같은 버튼 재클릭 → 취소
            if ((isYes && prev === true) || (!isYes && prev === false)) {
              state[sec.id][idx] = null;
              row.classList.remove('ans-yes','ans-no');
              row.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('active'));
            } else {
              state[sec.id][idx] = isYes;
              row.classList.toggle('ans-yes', isYes);
              row.classList.toggle('ans-no',  !isYes);
              row.querySelector('.yn-btn.yes').classList.toggle('active',  isYes);
              row.querySelector('.yn-btn.no' ).classList.toggle('active', !isYes);
            }
            update();
          });
        });

        body.appendChild(row);
        itemIdx++;
      });
    });

    card.appendChild(hdr);
    card.appendChild(mini);
    card.appendChild(body);
    container.appendChild(card);
  });

  document.getElementById('total-n').textContent = totalItems;
  document.getElementById('left-n').textContent  = totalItems;
  update();
}

function update() {
  let allYes = 0, allAnswered = 0, allTotal = 0;

  SECTIONS.forEach(sec => {
    const vals    = Object.values(state[sec.id]);
    const total   = vals.length;
    const yes     = vals.filter(v => v === true).length;
    const answered= vals.filter(v => v !== null).length;
    allYes      += yes;
    allAnswered += answered;
    allTotal    += total;

    const pct = total ? Math.round((yes/total)*100) : 0;
    document.getElementById(`pill-${sec.id}`).textContent = `${yes} / ${total}`;
    document.getElementById(`pill-${sec.id}`).classList.toggle('done', yes===total && total>0);
    document.getElementById(`mini-${sec.id}`).style.width = pct + '%';
  });

  const pct = allTotal ? Math.round((allYes/allTotal)*100) : 0;
  document.getElementById('pct').textContent      = pct + '%';
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('done-n').textContent   = allYes;
  document.getElementById('total-n').textContent  = allTotal;
  document.getElementById('left-n').textContent   = allTotal - allYes;

  // 단계 업데이트
  for (let i=0;i<5;i++) document.getElementById('st'+i).classList.remove('active');
  const si = pct>=80?4:pct>=60?3:pct>=40?2:pct>=20?1:0;
  document.getElementById('st'+si).classList.add('active');

  // 배너
  const banner = document.getElementById('stage-banner');
  const stg = STAGES[si];
  banner.className = 'stage-banner show ' + stg.cls;
  banner.textContent = stg.text;

  // 모든 항목에 답변 완료 시 결과창 자동 표시
  if (allAnswered === allTotal && allTotal > 0) {
    setTimeout(showResult, 400);
  }
}

// ── 결과 모달 ────────────────────────────────────────────────────
function showResult() {
  let allYes = 0, allTotal = 0;
  SECTIONS.forEach(sec => {
    const vals  = Object.values(state[sec.id]);
    allYes   += vals.filter(v => v === true).length;
    allTotal += vals.length;
  });

  const allAnswered = SECTIONS.reduce((s, sec) =>
    s + Object.values(state[sec.id]).filter(v => v !== null).length, 0);

  const pct = allTotal ? Math.round((allYes/allTotal)*100) : 0;
  const si  = pct>=80?4:pct>=60?3:pct>=40?2:pct>=20?1:0;
  const stg = STAGES[si];

  document.getElementById('modal-score').textContent = pct + '%';
  document.getElementById('modal-answered-info').textContent =
    `${allAnswered}개 답변 완료 · ${allTotal - allAnswered}개 미답변`;

  const badge = document.getElementById('modal-badge');
  badge.textContent = stg.badge;
  badge.style.background = stg.badgeBg;
  badge.style.color       = stg.badgeColor;

  document.getElementById('modal-stage-desc').textContent = stg.text.replace(/^.\s+/,'');

  // 영역별 행
  const rowsEl = document.getElementById('modal-rows');
  rowsEl.innerHTML = '';
  const weakSecs = [];
  SECTIONS.forEach((sec, si2) => {
    const vals  = Object.values(state[sec.id]);
    const total = vals.length;
    const yes   = vals.filter(v => v === true).length;
    const pct2  = total ? Math.round((yes/total)*100) : 0;
    if (pct2 < 60) weakSecs.push(sec.id);
    const color = SECTION_COLORS[si2];
    rowsEl.innerHTML += `
      <div class="result-row">
        <div class="result-row-icon">${sec.icon}</div>
        <div class="result-row-name">${sec.name}</div>
        <div class="result-row-bar-wrap">
          <div class="result-row-bar-bg">
            <div class="result-row-bar-fill" style="width:${pct2}%;background:${color}"></div>
          </div>
          <div class="result-row-pct" style="color:${color}">${pct2}%</div>
        </div>
      </div>`;
  });

  // 조언
  const advEl = document.getElementById('modal-advice');
  if (weakSecs.length === 0) {
    advEl.innerHTML = `<div class="advice-line">모든 영역이 잘 준비되어 있어요! 오늘 강의로 마지막 빈틈을 채워보세요.</div>`;
  } else {
    advEl.innerHTML = weakSecs.slice(0,3).map(id =>
      `<div class="advice-line">${ADVICES[id]}</div>`
    ).join('');
  }

  document.getElementById('result-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeResult() {
  document.getElementById('result-modal').classList.remove('show');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('result-modal')) closeResult();
}

function resetAll() {
  if (!confirm('모든 답변을 초기화할까요?')) return;
  SECTIONS.forEach(sec => {
    Object.keys(state[sec.id]).forEach(k => { state[sec.id][k] = null; });
  });
  buildUI();
}

buildUI();
</script>
